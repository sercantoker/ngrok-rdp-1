name: AWS-RDP
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: Ngrok Kurulumu
      run: choco install ngrok
        
    - name: Ngrok Auth Token Bagla
      run: ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

    - name: RDP Erisimini Aktif Et ve Sifre Koy
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
        # SIFRE BURADA BELIRLENIYOR:
        net user runneradmin Sercan123!

    - name: Ngrok Tunelini Baslat
      run: Start-Process Powershell -ArgumentList '-Noexit -Command "ngrok tcp 3389"'

    - name: Baglanti Bilgilerini Ekrana Yazdir
      run: |
        Write-Host "RDP Hazirlaniyor... Lutfen 20 saniye bekleyin."
        Start-Sleep -s 20
        $tunnels = iwr -Uri http://127.0.0.1:4040/api/tunnels | ConvertFrom-Json
        $public_url = $tunnels.tunnels.public_url
        Write-Host "----------------------------------------------------"
        Write-Host "BAGLANTI ADRESI: $public_url"
        Write-Host "KULLANICI ADI: runneradmin"
        Write-Host "SIFRE: Sercan123!"
        Write-Host "----------------------------------------------------"

    - name: Sistemi Acik Tut (6 Saat)
      run: |
        $i = 360
        do {
            Write-Host "Kalan Sure: $i Dakika"
            Start-Sleep -Seconds 60
            $i--
        } while ($i -gt 0)
